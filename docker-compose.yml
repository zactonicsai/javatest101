version: "3.9"

# =============================================================================
# Java 21 / Spring Boot 3.5.13 — Test-Driven Development Stack
# Services: PostgreSQL, Redis, LocalStack (S3 + SQS), Keycloak, Temporal
# =============================================================================

name: tdd-stack

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — primary application database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: tdd-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
      POSTGRES_MULTIPLE_DATABASES: appdb,temporal,keycloak
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/10-init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [tdd-net]

  # ---------------------------------------------------------------------------
  # Redis 7 — cache, rate limiting, session store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tdd-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "redispass"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [tdd-net]

  # ---------------------------------------------------------------------------
  # LocalStack — AWS emulator (S3 + SQS in one container)
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:3.8
    container_name: tdd-localstack
    environment:
      SERVICES: s3,sqs,sts,iam
      DEBUG: 0
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      PERSISTENCE: 1
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\": \"\\(running\\|available\\)\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [tdd-net]

  # ---------------------------------------------------------------------------
  # Keycloak 26 — OIDC identity provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: tdd-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: appuser
      KC_DB_PASSWORD: apppass
      KC_HOSTNAME: localhost
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [tdd-net]

  # ---------------------------------------------------------------------------
  # Temporal — workflow engine (auto-setup includes UI + server + worker)
  # ---------------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.25
    container_name: tdd-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: appuser
      POSTGRES_PWD: apppass
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "localhost:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [tdd-net]

  temporal-ui:
    image: temporalio/ui:2.32.0
    container_name: tdd-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks: [tdd-net]

# =============================================================================
volumes:
  postgres-data:
  redis-data:
  localstack-data:

networks:
  tdd-net:
    driver: bridge
